name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Shell syntax + lint
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # ALL shell scripts (scaffolders were previously unchecked) — syntax + lint, BLOCKING.
          scripts=$(find skills hooks tests -name '*.sh')
          for f in $scripts; do bash -n "$f"; done
          shellcheck -S warning $scripts

      - name: Tests (detection, verify-loop, guard, update-block)
        run: |
          for t in tests/*_test.sh; do echo "== $t =="; bash "$t"; done

      - name: Engine + adapter unit tests (bun)
        run: |
          for m in rag-feedback intent-router verify-evidence; do
            echo "== agentic-engine/$m =="; ( cd "agentic-engine/$m" && bun test )
          done
          echo "== agentic-engine/cross-vendor =="; bash agentic-engine/cross-vendor/test/outside-voices.test.sh
          echo "== adapters/opencode =="; ( cd adapters/opencode && bun install && bun test && bun run typecheck )

      - name: Codex plugin install smoke (model-free)
        run: |
          npm install -g @openai/codex@0.141.0
          bash tests/codex_install_smoke.sh

      - name: Identity + version coherence (what --strict can't catch)
        run: |
          # No banned/placeholder identity on the distribution surface.
          if grep -rnE 'jack-buzzni|"name": *"jack"' .claude-plugin/ LICENSE; then
            echo "::error::banned/placeholder identity on a distribution surface — use the jhlee0409 identity"; exit 1
          fi
          # plugin.json version must have a matching CHANGELOG section (no version drift).
          v=$(python3 -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          grep -q "## \[$v\]" CHANGELOG.md || { echo "::error::plugin.json version $v has no '## [$v]' CHANGELOG section"; exit 1; }

      - name: Validate plugin manifest (strict)
        run: |
          npm install -g @anthropic-ai/claude-code
          # `claude plugin validate` is a local schema check (no API call).
          claude plugin validate . --strict
