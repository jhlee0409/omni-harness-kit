name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Shell syntax + lint
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          for f in skills/introspect/detect.sh hooks/scripts/protected-branch-guard.sh \
                   hooks/scripts/verify-loop.sh tests/detect_test.sh tests/verify_loop_test.sh; do
            bash -n "$f"
          done
          shellcheck -S warning skills/introspect/detect.sh hooks/scripts/*.sh || true

      - name: Tests (detection engine + verify-loop hook)
        run: |
          bash tests/detect_test.sh
          bash tests/verify_loop_test.sh

      - name: Validate plugin manifest (strict)
        run: |
          npm install -g @anthropic-ai/claude-code
          # `claude plugin validate` is a local schema check (no API call).
          claude plugin validate . --strict
