name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Shell syntax + lint
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          for f in skills/introspect/*.sh hooks/scripts/*.sh tests/*.sh; do bash -n "$f"; done
          shellcheck -S warning skills/introspect/*.sh hooks/scripts/*.sh || true

      - name: Tests (detection, verify-loop, guard, update-block)
        run: |
          for t in tests/*_test.sh; do echo "== $t =="; bash "$t"; done

      - name: Validate plugin manifest (strict)
        run: |
          npm install -g @anthropic-ai/claude-code
          # `claude plugin validate` is a local schema check (no API call).
          claude plugin validate . --strict
